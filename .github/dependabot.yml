version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      frontend-dev:
        patterns:
          - "@types/*"
          - "eslint*"
          - "typescript"
          - "vite*"
          - "vitest*"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "jsdom"
          - "@testing-library/*"

  - package-ecosystem: pip
    directory: "/apps/backend"
    schedule:
      interval: weekly
